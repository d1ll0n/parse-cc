name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run types:check
      - run: npm test
      - run: npm run build
      - name: Verify tarball contents
        run: |
          npm pack --dry-run 2>&1 | tee /tmp/pack.txt
          ! grep -E '(tests/|scripts/|docs/|CLAUDE\.md|biome\.json|\.husky|vitest\.config|tsconfig\.json|\.github/)' /tmp/pack.txt

      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
